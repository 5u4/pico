[workspace]
resolver = "3"
members = ["crates/core", "crates/worker", "crates/supervisor"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.92"

[workspace.dependencies]
color-eyre = "0.6.5"
pico-core = { path = "crates/core" }
poise = "0.6.2"
rig-core = "0.38.2"
serde = { version = "1.0.228", features = ["derive"] }
serenity = "0.12.5"
sqlx = { version = "0.9.0", features = ["runtime-tokio", "sqlite"] }
tokio = { version = "1.52.3", features = ["full"] }
tokio-cron-scheduler = "0.15.1"
toml = "1.1.2"
tracing = "0.1.44"
tracing-error = "0.2.1"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

[workspace.lints.clippy]
pub_use = "deny"

[profile.dev.package.backtrace]
opt-level = 3
