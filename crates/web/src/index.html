<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pico</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
  #log { flex: 1; overflow-y: auto; padding: 1rem; }
  .bubble { margin: 0.5rem 0; padding: 0.5rem 0.75rem; border-radius: 0.5rem; white-space: pre-wrap; }
  .user { background: #e6f0ff; }
  .assistant { background: #f2f2f2; }
  #composer { display: flex; padding: 0.75rem; border-top: 1px solid #ddd; gap: 0.5rem; }
  #input { flex: 1; padding: 0.5rem; font: inherit; }
  button { padding: 0.5rem 1rem; font: inherit; }
</style>
</head>
<body>
<div id="log"></div>
<div id="composer">
  <input id="input" placeholder="Message pico…" autocomplete="off" />
  <button id="send">Send</button>
</div>
<script>
const log = document.getElementById("log");
const input = document.getElementById("input");
const bubbles = new Map();

function addBubble(id, text, cls) {
  const el = document.createElement("div");
  el.className = "bubble " + cls;
  el.textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  if (id !== null) bubbles.set(id, el);
  return el;
}

const ws = new WebSocket("ws://" + location.host + "/ws");
ws.onmessage = (ev) => {
  const f = JSON.parse(ev.data);
  if (f.kind === "bubble_new") addBubble(f.id, f.text, "assistant");
  else if (f.kind === "bubble_patch") {
    const el = bubbles.get(f.id);
    if (el) { el.textContent = f.text; log.scrollTop = log.scrollHeight; }
  }
  else if (f.kind === "title") document.title = f.title + " · pico";
  else if (f.kind === "error") addBubble(null, "error: " + f.message, "assistant");
};

function send() {
  const text = input.value.trim();
  if (!text) return;
  addBubble(null, text, "user");
  ws.send(JSON.stringify({ kind: "prompt", text }));
  input.value = "";
}
document.getElementById("send").onclick = send;
input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
</script>
</body>
</html>
