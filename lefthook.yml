pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: comments
      run: bun run scripts/lint-comments.ts --cached

pre-push:
  parallel: true
  jobs:
    - name: typecheck
      run: bun run typecheck
    - name: test
      run: sh -c 'unset $(git rev-parse --local-env-vars); bun test ./packages ./apps'
