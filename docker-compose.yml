services:
  pico:
    container_name: pico
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PICO_UID: "${PICO_UID:-1000}"
        PICO_GID: "${PICO_GID:-1000}"
    init: true
    shm_size: "1gb"
    restart: unless-stopped
    working_dir: /home/pico/.pico/agent
    # Fully unprivileged: image runs as USER pico; the only thing pico needs that
    # it does not own is the docker socket, granted here via its group.
    group_add:
      - "${DOCKER_GID:-0}"         # docker.sock group: 0 (root) on OrbStack; set DOCKER_GID for root:docker hosts
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      # noVNC for manual camofox login. The 127.0.0.1: prefix blocks host/LAN exposure;
      # noVNC is passwordless (x11vnc -nopw). NOTE: with VNC_BIND=0.0.0.0 below, 6080 is
      # still reachable from other containers on this compose network (e.g. hindsight) —
      # set VNC_PASSWORD before exposing past container-local/loopback.
      - "127.0.0.1:6080:6080"
    # VNC_BIND makes camofox's noVNC bind the container bridge (not container-loopback),
    # else the published port can't reach it: Docker DNATs host 127.0.0.1 -> bridge IP.
    environment:
      VNC_BIND: "0.0.0.0"
      # RUST_LOG: "pico_core=trace"   # stdout stays info; a target directive ADDS to the file (floor is debug) — e.g. to capture the omp frame stream
    volumes:
      - ${HOME}/.pico:/home/pico/.pico
      - ${HOME}/.omp:/home/pico/.omp
      - /var/run/docker.sock:/var/run/docker.sock
      - pico-supervisor:/home/pico/.pico/supervisor
      # Mounted at .cache, not .cache/camoufox: camoufox-js rm -rf's its whole
      # INSTALL_DIR (~/.cache/camoufox) before each engine fetch, which EBUSYs on a
      # mount point. The cargo build cache nests inside on its own volume.
      - pico-cache:/home/pico/.cache
      - pico-build:/home/pico/.cache/build

  # Long-running Hindsight memory server. Reached by omp inside the pico
  # container at http://hindsight:8888 (shared compose network). pico's own code
  # is memory-agnostic; enable memory in omp config (memory.backend: hindsight).
  hindsight:
    container_name: hindsight
    image: ${PICO_HINDSIGHT_IMAGE:-ghcr.io/vectorize-io/hindsight:latest}
    restart: unless-stopped
    env_file:
      - path: .env.hindsight
        required: false
    environment:
      HINDSIGHT_API_LLM_PROVIDER: openai
      HINDSIGHT_API_LLM_BASE_URL: https://api.enterprise.githubcopilot.com
      HINDSIGHT_API_LLM_MODEL: gpt-4o-mini
      # gpt-4o-mini's Copilot prompt cap is 64000 tokens. Reflect's mental-model
      # refresh accumulated 70k-95k of tool results and looped forever on the
      # resulting retried 400s (the poller rescheduled the failed task every
      # minute). Cap reflect's accumulated context below 64000 so synthesis is
      # forced before the prompt overflows, and cap each search_observations
      # result so one call can't dominate. Reflect keeps its full multi-tool
      # retrieval; only the runaway accumulation is bounded.
      #
      # Sonnet was tried here and rejected: hindsight's reflect loop treats the
      # model's tool-free turn as the final answer, but Claude ends such a turn
      # with a "let me now answer" preamble instead of the synthesis 4o-mini
      # emits, so sonnet returned ~150-char preambles. Fixing that needs an
      # in-container source patch that a new image would drop.
      HINDSIGHT_API_REFLECT_MAX_CONTEXT_TOKENS: "48000"
      HINDSIGHT_API_REFLECT_SOURCE_FACTS_MAX_TOKENS: "8000"
    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:9999:9999"
    volumes:
      - hindsight-data:/home/hindsight/.pg0
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/version"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 900s

volumes:
  pico-supervisor:
  pico-build:
  pico-cache:
  hindsight-data:
