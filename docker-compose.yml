services:
  pico:
    container_name: pico
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PICO_UID: "${PICO_UID:-1000}"
        PICO_GID: "${PICO_GID:-1000}"
    init: true
    shm_size: "1gb"
    restart: unless-stopped
    working_dir: /home/pico/.pico/agent
    # Fully unprivileged: image runs as USER pico; the only thing pico needs that
    # it does not own is the docker socket, granted here via its group.
    group_add:
      - "${DOCKER_GID:-0}"         # docker.sock group: 0 (root) on OrbStack; set DOCKER_GID for root:docker hosts
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ${HOME}/.pico:/home/pico/.pico
      - ${HOME}/.omp:/home/pico/.omp
      - /var/run/docker.sock:/var/run/docker.sock
      - pico-supervisor:/home/pico/.pico/supervisor
      # Mounted at .cache, not .cache/camoufox: camoufox-js rm -rf's its whole
      # INSTALL_DIR (~/.cache/camoufox) before each engine fetch, which EBUSYs on a
      # mount point. The cargo build cache nests inside on its own volume.
      - pico-cache:/home/pico/.cache
      - pico-build:/home/pico/.cache/build

  # Opt-in long-term memory. Start with `docker compose --profile memory up`;
  # set GROQ_API_KEY in .env first. pico reaches it at http://hindsight:8888
  # (set `[memory] endpoint` in the worker config.toml).
  hindsight:
    container_name: hindsight
    image: ghcr.io/vectorize-io/hindsight:latest
    profiles: ["memory"]
    restart: unless-stopped
    environment:
      HINDSIGHT_API_LLM_PROVIDER: groq
      HINDSIGHT_API_LLM_MODEL: openai/gpt-oss-20b
      HINDSIGHT_API_LLM_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - hindsight-data:/home/hindsight/.pg0
      - hindsight-cache:/home/hindsight/.cache

volumes:
  pico-supervisor:
  pico-build:
  pico-cache:
  hindsight-data:
  hindsight-cache:
